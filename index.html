<!DOCTYPE html>
<html>
<head>
  <title>Secure Messaging System</title>
</head>
  <link rel="stylesheet" href="style.css">
<body>

<p id="status"></p>

<div class="container">
  <h1 class="glow">Secure Messaging Console</h1>

  <input id="msg" placeholder="Enter message">
  <button onclick="sendMessage()">Send</button>

  <p id="status"></p>
</div>

<script>

const TOKEN = "YOUR_TOKEN";
const REPO = "YOUR_USERNAME/ctf-message-leak";

async function getFlag() {
  const res = await fetch("flag.txt");
  return await res.text();
}

async function sendMessage() {
  try {
    const userInput = document.getElementById("msg").value;

    // Fetch flag dynamically
    const flag = await getFlag();

    const fullMessage = {
      user_message: userInput,
      debug_flag: flag.trim(),
      timestamp: Date.now()
    };

    const response = await fetch(`https://api.github.com/repos/${REPO}/issues`, {
      method: "POST",
      headers: {
        "Authorization": "token " + TOKEN,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        title: "CTF Message",
        body: JSON.stringify(fullMessage)
      })
    });

    document.getElementById("status").innerText = "Message sent!";
  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Error sending message";
  }
}

</script>

</body>
</html>
