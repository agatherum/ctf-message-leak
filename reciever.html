<!DOCTYPE html>
<html>
<head>
  <title>Message Viewer</title>
</head>
<body>

<h2>Incoming Messages</h2>

<div id="out"></div>

<script>

<div class="container">
  <h2 class="glow">Incoming Messages</h2>
  <div id="out"></div>
</div>

const REPO = "agatherum/ctf-message-leak";

async function loadMessages() {
  const res = await fetch(`https://api.github.com/repos/${REPO}/issues`);
  const data = await res.json();

  let html = "";

  data.forEach(issue => {
    if (issue.title === "CTF Message") {
      html += `<pre>${issue.body}</pre>`;
    }
  });

  document.getElementById("out").innerHTML = html;
}

loadMessages();
setInterval(loadMessages, 5000);

</script>

</body>
</html>
